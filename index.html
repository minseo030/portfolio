<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    .container {
      padding: 80px 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      opacity: 0.9;
    }

    .card {
      background: white;
      color: black;
      margin: 40px auto;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #667eea;
      color: white;
      border-radius: 25px;
      text-decoration: none;
    }

    .btn:hover {
      background: #5a67d8;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>민서의 포트폴리오</h1>
    <p>안녕하세요 👋 저를 소개합니다</p>

    <div class="card">
      <h2>👤 About Me</h2>
      <p>이름: 민서</p>
      <p>전공: (여기 쓰기)</p>
      <p>목표: (여기 쓰기)</p>

      <a href="#" class="btn">연락하기</a>
    </div>
  </div>

</body>
</html>

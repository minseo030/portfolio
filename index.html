<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>애니메이션·서브컬처 콘텐츠를 제작하는 크리에이터</title>

<style>
body {
  margin: 0;
  font-family: 'Pretendard', sans-serif;
  background: linear-gradient(135deg, #ffe4ec, #ffd6e7);
  color: #333;
}

h1 {
  text-align: center;
  padding: 30px;
  color: #ff4d88;
}

section {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 25px;
  margin-bottom: 30px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.title {
  font-size: 22px;
  margin-bottom: 15px;
  color: #ff4d88;
  font-weight: bold;
}

.btn {
  padding: 8px 16px;
  border-radius: 20px;
  background: #ff80ab;
  color: white;
  text-decoration: none;
  font-size: 13px;
}

.btn:hover {
  background: #ff4d88;
}

/* 릴스 */
.reels iframe {
  width: 100%;
  height: 500px;
  border-radius: 15px;
  border: none;
}

/* 기획서 */
.plan-box {
  border: 2px dashed #ff9eb5;
  padding: 20px;
  border-radius: 15px;
  background: #fff0f5;
}

.plan-item {
  display: flex;
  justify-content: space-between;
  margin: 15px 0;
}
</style>
</head>

<body>

<h1>애니메이션·서브컬처 콘텐츠를 제작하는 크리에이터</h1>

<section>

<!-- 소개 -->
<div class="card">
  <div class="title">소개</div>
  <p>
    안녕하십니까. 빅데이터응용통계학과 박민서입니다.<br><br>
    저는 트렌드와 서브컬처 감성을 결합한 콘텐츠를 제작하는 크리에이터를 목표로 하고 있습니다.
  </p>
</div>

<!-- 릴스 -->
<div class="card reels">
  <div class="title">릴스</div>

  <!-- ✔ 이미 작동되는 릴스 하나 넣어둠 -->
  <iframe src="https://www.instagram.com/reel/C2xw4u4Pz1Q/embed"></iframe>

</div>

<!-- 기획서 -->
<div class="card">
  <div class="title">기획서</div>

  <div class="plan-box">

    <div class="plan-item">
      <span>기획서 1</span>
      <a href="#" class="btn">보기</a>
    </div>

    <div class="plan-item">
      <span>기획서 2</span>
      <a href="#" class="btn">보기</a>
    </div>

    <div class="plan-item">
      <span>오타플레이스</span>
      <a href="#" class="btn">바로가기</a>
    </div>

  </div>

</div>

</section>

</body>
</html>

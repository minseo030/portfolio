<style>
body {
  margin: 0;
  font-family: 'Arial Black', sans-serif;
  background-color: #fff0f5;
  background-image: 
    radial-gradient(circle, #ffe4ec 10%, transparent 10%),
    radial-gradient(circle, #e0f7ff 10%, transparent 10%);
  background-size: 40px 40px;
}

/* 상단 제목 */
header {
  text-align: center;
  font-size: 42px;
  font-weight: 900;
  color: #ff6f91;
  padding: 40px 0;
}

/* 공통 컨테이너 */
.container {
  width: 90%;
  max-width: 1000px;
  margin: auto;
}

/* 릴스 섹션 */
.reels-box {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 50px;
}

.reels-title {
  background: #ffc0cb;
  color: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  font-weight: bold;
  margin-bottom: 20px;
}

/* 릴스 4개 나란히 */
.reels {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

.reel {
  text-decoration: none;
  color: black;
}

/* 썸네일 */
.reel img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 12px;
}

/* 하단 카드 */
.section {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 30px;
}

.section h2 {
  color: #ff69b4;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #ff69b4;
  color: white;
  text-decoration: none;
  border-radius: 10px;
}
</style>

</head>

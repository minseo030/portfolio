<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>chanal 기린</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff0f5;
    }

    header {
      background: linear-gradient(45deg, #ffb6c1, #ff69b4);
      padding: 25px;
      text-align: center;
      font-size: 30px;
      font-weight: bold;
      color: white;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 30px;
    }

    h2 {
      color: #ff69b4;
      border-bottom: 2px solid #ffc0cb;
      padding-bottom: 5px;
    }

    /* 릴스 카드 */
    .reels {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .reel-card {
      display: block;
      padding: 40px;
      background: #ffc0cb;
      border-radius: 15px;
      text-align: center;
      text-decoration: none;
      color: white;
      font-size: 20px;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .reel-card:hover {
      background: #ff69b4;
      transform: translateY(-5px);
    }

    /* 카드 공통 */
    .card {
      margin-top: 50px;
      padding: 25px;
      background: #ffe4e1;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 18px;
      background: #ff69b4;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff1493;
    }
  </style>
</head>

<body>

  <header>
    chanal 기린
  </header>

  <div class="container">

    <!-- 릴스 -->
    <h2>릴스</h2>

    <div class="reels">
      <a href="https://www.instagram.com/reborn_030/reel/DW1fMWzAX4S/" target="_blank" class="reel-card">
        💖 릴스 1 보러가기
      </a>

      <a href="https://www.instagram.com/reborn_030/reel/DW1fMWzAX4S/" target="_blank" class="reel-card">
        💖 릴스 2 보러가기
      </a>

      <a href="https://www.instagram.com/reborn_030/reel/DZuDci9h_6j/" target="_blank" class="reel-card">
        💖 릴스 3 보러가기
      </a>
    </div>

    <!-- 오타프레 -->
    <div class="card">
      <h2>나의 홈페이지 "오타프레"</h2>
      <p>AI로 제작한 나만의 웹사이트</p>

      <a href="https://ottaplace.aiapp.help/?v=ver-3383806b-564d-4257-a47f-0849d8782de2"
         target="_blank"
         class="btn">
         오타프레 바로가기
      </a>
    </div>

    <!-- 기획서 -->
    <div class="card">
      <h2>굿즈 기획</h2>
      <p>기획 문서 보기</p>

      <a href="https://docs.google.com/document/d/1JBG-0nYka6AG7-MRtxFu0aFx9ZPeS2pv2fcOySRVnN8/edit"
         target="_blank"
         class="btn">
         문서 열기
      </a>
    </div>

  </div>

</body>
</html>

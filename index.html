<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>chanal 기린</title>

<style>
body {
  margin: 0;
  font-family: 'Arial Black', sans-serif;
  background-color: #fff0f5;
}

/* 제목 */
header {
  text-align: center;
  font-size: 42px;
  font-weight: 900;
  color: #ff6f91;
  padding: 40px 0;
}

/* 컨테이너 */
.container {
  width: 90%;
  max-width: 1100px;
  margin: auto;
}

/* 릴스 박스 */
.reels-box {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 50px;
}

.reels-title {
  background: #ffc0cb;
  color: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  font-weight: bold;
  margin-bottom: 20px;
}

/* 4개 배치 */
.reels {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

/* iframe */
.reel iframe {
  width: 100%;
  height: 250px;
  border-radius: 12px;
  border: none;
}

/* 하단 */
.section {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 30px;
}

.section h2 {
  color: #ff69b4;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #ff69b4;
  color: white;
  text-decoration: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>chanal 기린</header>

<div class="container">

  <!-- 릴스 -->
  <div class="reels-box">
    <div class="reels-title">내 릴스</div>

    <div class="reels">

      <div class="reel">
        <iframe src="https://www.instagram.com/reel/DW1fMWzAX4S/embed"></iframe>
      </div>

      <div class="reel">
        <iframe src="https://www.instagram.com/reel/DXN6ZXtgfgs/embed"></iframe>
      </div>

      <div class="reel">
        <iframe src="https://www.instagram.com/reel/DX6Wx6jh567/embed"></iframe>
      </div>

      <div class="reel">
        <iframe src="https://www.instagram.com/reel/DZuDci9h_6j/embed"></iframe>
      </div>

    </div>
  </div>

  <!-- 기획서 -->
  <div class="section">
    <h2>기획서 1</h2>
    <a href="https://docs.google.com/document/d/1W03lXA3HtOk9FFkEo2jmVUaPpAKNx0PWdITMu8mbTIs/edit?tab=t.0"
       target="_blank" class="btn">열기</a>
  </div>

  <div class="section">
    <h2>기획서 2</h2>
    <a href="https://docs.google.com/document/d/1J4wDncyQ7DMA5UHpoFx3K_KT6HoNioaAPrcJCwanoeA/edit?tab=t.0"
       target="_blank" class="btn">열기</a>
  </div>

  <!-- 오타플레이스 -->
  <div class="section">
    <h2>오타 플레이스</h2>
    <a href="https://ottaplace.aiapp.link/?v=ver-ace6e479-e48e-46ac-98a6-7ec47582e80d#"
       target="_blank" class="btn">바로가기</a>
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>채널 기린 포트폴리오</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Pretendard',sans-serif;
  color:#444;

  background-color:#fff7fb;

  background-image:
    radial-gradient(#ffb6d9 2px, transparent 2px),
    radial-gradient(#ffd6ea 2px, transparent 2px);

  background-size:40px 40px;
  background-position:0 0,20px 20px;
}

/* 네비 */

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:20px 40px;

  background:#ff8fc7;

  position:sticky;
  top:0;

  z-index:999;

  box-shadow:0 3px 15px rgba(255,143,199,.3);
}

.logo{
  color:white;
  font-size:24px;
  font-weight:800;
}

.menu a{
  margin-left:25px;
  color:white;
  text-decoration:none;
  font-weight:600;
}

/* 히어로 */

.hero{
  text-align:center;

  padding:120px 20px;

  background:
  linear-gradient(
    135deg,
    #ffb6d9,
    #ff8fc7
  );

  color:white;
}

.hero h1{
  font-size:52px;
  line-height:1.4;
}

.hero span{
  color:#fff3a0;
}

.hero p{
  margin-top:15px;
  font-size:18px;
}

/* 릴스 */

.reels-section{
  padding:80px 40px;
}

.reels-section h2{
  text-align:center;
  margin-bottom:40px;
  font-size:34px;
  color:#ff69b4;
}

.reels{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.reel iframe{
  width:100%;
  height:500px;

  border:none;

  border-radius:25px;

  background:white;

  box-shadow:
  0 10px 25px rgba(255,143,199,.25);
}

/* 기획서 */

.section{
  width:90%;
  max-width:1100px;

  margin:50px auto;

  padding:50px;

  border-radius:30px;

  background:rgba(255,255,255,.85);

  backdrop-filter:blur(10px);

  box-shadow:
  0 10px 25px rgba(255,143,199,.15);
}

.section h2{
  color:#ff69b4;
  margin-bottom:30px;
}

.section p{
  margin-top:20px;
  font-weight:600;
}

/* 버튼 */

.btn{
  display:inline-block;

  margin-top:10px;
  margin-bottom:10px;

  padding:12px 22px;

  text-decoration:none;

  color:white;

  background:#ff8fc7;

  border-radius:999px;

  transition:.2s;
}

.btn:hover{
  transform:translateY(-3px);
  background:#ff6fb9;
}

/* 푸터 */

footer{
  text-align:center;
  padding:40px;
  color:#999;
}
</style>

</head>
<body>

  <p>

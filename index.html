<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>민서 포트폴리오</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    .container {
      padding: 80px 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
    }

    .card {
      background: white;
      color: black;
      margin: 40px auto;
      padding: 30px;
      border-radius: 15px;
      max-width: 900px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .reels {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    iframe {
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: #667eea;
      color: white;
      border-radius: 25px;
      text-decoration: none;
      margin-top: 20px;
    }

    .btn:hover {
      background: #5a67d8;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- 제목 -->
    <h1>민서의 포트폴리오</h1>
    <p>안녕하세요 👋 저를 소개합니다</p>

    <!-- 자기소개 -->
    <div class="card">
      <h2>👤 insta-@reborn030,@ameame.official</h2>   
      <p>행복한 오타쿠생활</p>
    </div>

    <!-- 릴스 -->
    <div class="card">
      <h2>📱 내 릴스</h2>

      <div class="reels">
        <iframe src="https://www.instagram.com/reel/DX6Wx6jh567/embed" width="300" height="550"></iframe>
        <iframe src="https://www.instagram.com/reel/DXN6ZXtgfgs/embed" width="300" height="550"></iframe>
      </div>

    </div>

    <!-- ⭐ 여기 중요: 릴스 아래 새로운 카드 -->
    <div class="card">
      <h2>📦 프로젝트 기획</h2>

      <a href="https://docs.google.com/document/d/1JBG-0nYka6AG7-MRtxFu0aFx9ZPeS2pv2fcOySRVnN8/edit?usp=sharing"
         target="_blank"
         class="btn">
         기획서 보러가기
      </a>
    </div>

  </div>

</body>
</html>

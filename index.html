<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>민서 포트폴리오</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fecfef);
      text-align: center;
      color: #333;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 42px;
      color: #ff4d88;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
    }

    .card {
      background: white;
      margin: 30px auto;
      padding: 25px;
      border-radius: 20px;
      max-width: 900px;
      box-shadow: 0 8px 25px rgba(255, 105, 180, 0.2);
    }

    h2 {
      color: #ff4d88;
    }

    .reels {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    iframe {
      border-radius: 15px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: #ff4d88;
      color: white;
      border-radius: 30px;
      text-decoration: none;
      margin-top: 20px;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
    }

    .btn:hover {
      background: #ff3385;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- 제목 -->
    <h1>💖 chanal reborn030 💖</h1>
    

    <!-- 자기소개 -->
    <div class="card">
        <h2>👤 insta-@reborn030,@ameame.official</h2>   
      <p>행복한 오타쿠생활</p>
    </div>

    <!-- 릴스 -->
    <div class="card">
      <h2>📱 My Reels</h2>

      <div class="reels">
        <iframe src="https://www.instagram.com/reel/DX6Wx6jh567/embed" width="300" height="550"></iframe>
        <iframe src="https://www.instagram.com/reel/DXN6ZXtgfgs/embed" width="300" height="550"></iframe>
      </div>
    </div>

    <!-- 기획 -->
    <div class="card">
      <h2>🎀 프로젝트 기획</h2>

      <a href="https://docs.google.com/document/d/1JBG-0nYka6AG7-MRtxFu0aFx9ZPeS2pv2fcOySRVnN8/edit?usp=sharing"
         target="_blank"
         class="btn">
         💌 기획서 보러가기
      </a>
    </div>

  </div>

</body>
</html>
